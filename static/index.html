<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Caption Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            margin: 0;
            padding: 2rem 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 2rem;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            text-align: left;
            margin-bottom: 2rem;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .setting-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .setting-group select, 
        .setting-group input[type="number"], 
        .setting-group input[type="color"] {
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--input-bg);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .setting-group select:focus, 
        .setting-group input:focus {
            border-color: var(--primary);
        }

        .setting-group input[type="color"] {
            height: 46px;
            padding: 4px;
            cursor: pointer;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 99px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            font-family: inherit;
        }

        .btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .btn:disabled {
            background: #334155;
            cursor: not-allowed;
            color: #94a3b8;
        }

        #videoPreview {
            width: 100%;
            max-height: 400px;
            border-radius: 12px;
            margin-top: 1.5rem;
            display: none;
            background: #000;
        }

        .loader {
            display: none;
            width: 48px;
            height: 48px;
            border: 5px solid rgba(255,255,255,0.1);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            margin: 2rem auto;
            animation: rotation 1s linear infinite;
        }

        .status-text {
            display: none;
            color: var(--primary);
            font-weight: 500;
            margin-top: 1rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .file-name {
            margin-top: 1rem;
            color: var(--primary);
            font-weight: 500;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Video Captions</h1>
        <p>Upload a video to automatically generate and burn Hinglish subtitles.</p>

        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <div id="uploadText">Click or drag a video here (.mp4, .mov)</div>
            <div class="file-name" id="fileName"></div>
            <input type="file" id="fileInput" accept="video/mp4,video/quicktime">
        </div>

        <div class="settings-grid" id="settingsArea">
            <div class="setting-group">
                <label for="fontSelect">Font Style</label>
                <select id="fontSelect">
                    <option value="Arial">Arial (Default)</option>
                    <option value="Impact">Impact (Bold & Blocky)</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Comic Sans MS">Comic Sans (Playful)</option>
                </select>
            </div>
            <div class="setting-group">
                <label for="fontSize">Font Size</label>
                <input type="number" id="fontSize" value="90" min="20" max="200">
            </div>
            <div class="setting-group">
                <label for="fontColor">Text Color</label>
                <input type="color" id="fontColor" value="#FFFFFF">
            </div>
            <div class="setting-group">
                <label for="positionSelect">Position</label>
                <select id="positionSelect">
                    <option value="bottom">Bottom</option>
                    <option value="middle">Middle</option>
                    <option value="top">Top</option>
                </select>
            </div>
        </div>

        <video id="videoPreview" controls></video>

        <button class="btn" id="generateBtn" disabled onclick="uploadVideo()">Generate Captions</button>

        <div class="loader" id="loader"></div>
        <div class="status-text" id="statusText">Transcribing and editing video... This may take a few minutes.</div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('statusText');
        const videoPreview = document.getElementById('videoPreview');
        const settingsArea = document.getElementById('settingsArea');

        let selectedFile = null;

        // Handle Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if(e.dataTransfer.files.length) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            if(file.type.startsWith('video/')) {
                selectedFile = file;
                fileNameDisplay.textContent = `Selected: ${file.name}`;
                generateBtn.disabled = false;
                videoPreview.style.display = 'none';
            } else {
                alert('Please select a valid video file.');
                resetSelection();
            }
        }

        function resetSelection() {
            selectedFile = null;
            fileNameDisplay.textContent = '';
            generateBtn.disabled = true;
            fileInput.value = '';
        }

        async function uploadVideo() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('font', document.getElementById('fontSelect').value);
            formData.append('size', document.getElementById('fontSize').value);
            formData.append('color', document.getElementById('fontColor').value);
            formData.append('position', document.getElementById('positionSelect').value);

            // UI Changes for loading
            generateBtn.style.display = 'none';
            dropZone.style.display = 'none';
            settingsArea.style.display = 'none';
            loader.style.display = 'block';
            statusText.style.display = 'block';

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || err.error || 'Upload failed');
                }

                // Get the video blob from response
                const blob = await response.blob();
                const videoUrl = URL.createObjectURL(blob);

                // Update UI to show result
                loader.style.display = 'none';
                statusText.style.display = 'none';
                videoPreview.src = videoUrl;
                videoPreview.style.display = 'block';
                
                // Change button to download and reset
                generateBtn.textContent = 'Upload Another Video';
                generateBtn.onclick = () => window.location.reload();
                generateBtn.style.display = 'block';

                // Trigger automatic download
                const a = document.createElement('a');
                a.href = videoUrl;
                a.download = `captioned_${selectedFile.name}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

            } catch (error) {
                alert(`Error: ${error.message}`);
                window.location.reload();
            }
        }
    </script>
</body>
</html>
